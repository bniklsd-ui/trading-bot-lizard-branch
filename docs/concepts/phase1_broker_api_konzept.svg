<text x="370" y="265" class="tm" style="fill:#059669;">"ok":</text>
<text x="400" y="265" class="tm">true | false,</text>
<text x="370" y="278" class="tm" style="fill:#059669;">"ts":</text>
<text x="400" y="278" class="tm">"2026-05-14T13:42:11.123Z",</text>
<text x="370" y="291" class="tm" style="fill:#059669;">"broker":</text>
<text x="416" y="291" class="tm">"ig",</text>
<text x="370" y="304" class="tm" style="fill:#059669;">"method":</text>
<text x="422" y="304" class="tm">"get_price",</text>
<text x="370" y="317" class="tm" style="fill:#059669;">"data":</text>
<text x="404" y="317" class="tm">{ ... } | null,</text>
<text x="370" y="330" class="tm" style="fill:#059669;">"error":</text>
<text x="413" y="330" class="tm">null | {</text>
<text x="384" y="343" class="tm" style="fill:#6B7280;">"code": "MARKET_OFFLINE",</text>
<text x="384" y="356" class="tm" style="fill:#6B7280;">"message": "405 ...",</text>
<text x="384" y="369" class="tm" style="fill:#6B7280;">"retryable": true</text>
<text x="370" y="382" class="tm" style="fill:#6B7280;">},</text>
<text x="370" y="395" class="tm" style="fill:#059669;">"latency_ms":</text>
<text x="452" y="395" class="tm">127</text>
<text x="356" y="408" class="tm" style="fill:#6B7280;">}</text>

