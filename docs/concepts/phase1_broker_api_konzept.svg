<text x="396" y="140" class="tm">ig_username · ig_password</text>
<text x="396" y="152" class="tm">ig_api_key · ig_account_id</text>
<text x="356" y="165" class="tm">macOS: Keychain · Linux: gnome-keyring · Win: CredMgr</text>
<text x="356" y="177" class="tm">fallback_env=True for CI/demo only, never production</text>
<text x="356" y="189" class="tm">AI reads get_credential() at runtime — no plaintext files</text>
<text x="356" y="201" class="tm">scripts/store_credential.py uses getpass — input hidden</text>

